<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGG Demobilization</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }
  .login-card {
    background: white; border-radius: 16px; padding: 48px 40px;
    width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; }
  .login-logo p { color: #6b7280; font-size: 14px; margin-top: 4px; }
  .login-card label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
  .login-card input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb;
    border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif;
    transition: border-color 0.2s; margin-bottom: 16px; outline: none;
  }
  .login-card input:focus { border-color: #0f3460; }
  .login-btn {
    width: 100%; padding: 12px; background: #0f3460; color: white;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .login-btn:hover { background: #16213e; }
  .login-error { color: #ef4444; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
  #app { display: none; }
  header {
    background: #1a1a2e; color: white; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between; height: 64px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100;
  }
  .header-left h1 { font-size: 20px; font-weight: 700; }
  .header-left span { font-size: 12px; color: #9ca3af; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .sync-btn {
    background: #0f3460; border: none; color: white; padding: 8px 16px;
    border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .sync-btn:hover { background: #16213e; }
  .logout-btn {
    background: transparent; border: 1px solid #4b5563; color: #9ca3af;
    padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .logout-btn:hover { border-color: #9ca3af; color: white; }
  .stats-bar {
    background: white; border-bottom: 1px solid #e5e7eb;
    padding: 16px 32px; display: flex; gap: 32px;
  }
  .stat { display: flex; flex-direction: column; }
  .stat-value { font-size: 24px; font-weight: 700; color: #1a1a2e; }
  .stat-label { font-size: 12px; color: #6b7280; font-weight: 500; margin-top: 2px; }
  .stat-deployed .stat-value { color: #dc2626; }
  .stat-scheduled .stat-value { color: #d97706; }
  .stat-home .stat-value { color: #16a34a; }
  .controls { padding: 20px 32px; display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
  .search-box { flex: 1; min-width: 240px; position: relative; }
  .search-box input {
    width: 100%; padding: 9px 14px 9px 38px; border: 1.5px solid #e5e7eb;
    border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s; background: white;
  }
  .search-box input:focus { border-color: #0f3460; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
  .filter-btns { display: flex; gap: 8px; }
  .filter-btn {
    padding: 8px 16px; border-radius: 8px; border: 1.5px solid #e5e7eb;
    background: white; font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: 'Inter', sans-serif; color: #374151;
  }
  .filter-btn:hover { border-color: #0f3460; color: #0f3460; }
  .filter-btn.active { background: #0f3460; color: white; border-color: #0f3460; }
  .add-btn {
    padding: 9px 18px; background: #16a34a; color: white; border: none;
    border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .add-btn:hover { background: #15803d; }
  .table-wrap { padding: 0 32px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  thead { background: #1a1a2e; }
  thead th { padding: 13px 16px; text-align: left; font-size: 12px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f3f4f6; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f9fafb; }
  tbody td { padding: 12px 16px; font-size: 14px; color: #374151; }
  .unit-num { font-weight: 600; color: #1a1a2e; }
  .editable-cell {
    cursor: pointer; padding: 6px 10px; border-radius: 6px;
    border: 1.5px solid transparent; outline: none; width: 100%;
    font-family: 'Inter', sans-serif; font-size: 14px; color: #374151; background: transparent;
  }
  .editable-cell:hover { background: #f3f4f6; border-color: #e5e7eb; }
  .editable-cell:focus { background: white; border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.1); }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: none; font-family: 'Inter', sans-serif; white-space: nowrap;
  }
  .status-badge:hover { opacity: 0.85; }
  .status-Deployed { background: #fee2e2; color: #dc2626; }
  .status-Scheduled { background: #fef3c7; color: #d97706; }
  .status-Home { background: #dcfce7; color: #16a34a; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .delete-btn { background: none; border: none; cursor: pointer; color: #d1d5db; font-size: 16px; padding: 4px; border-radius: 4px; }
  .delete-btn:hover { color: #ef4444; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; color: #1a1a2e; }
  .modal label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
  .modal input, .modal select { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; margin-bottom: 16px; outline: none; }
  .modal input:focus, .modal select:focus { border-color: #0f3460; }
  .modal-btns { display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px; }
  .modal-cancel { padding: 10px 20px; border: 1.5px solid #e5e7eb; background: white; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; }
  .modal-save { padding: 10px 20px; background: #0f3460; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 300; opacity: 0; transform: translateY(8px); transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: #16a34a; }
  .toast.error { background: #dc2626; }
  .empty-state { text-align: center; padding: 60px; color: #9ca3af; }
  .loading { text-align: center; padding: 60px; color: #6b7280; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #0f3460; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>GGG</h1>
      <p>Spring Demobilization 2026</p>
    </div>
    <label>Username</label>
    <input type="text" id="login-user" placeholder="Enter username" autocomplete="username">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Invalid username or password.</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <h1>GGG Demobilization</h1>
      <span id="last-sync">Spring Demobilization 2026</span>
    </div>
    <div class="header-right">
      <button class="sync-btn" onclick="loadData()" id="sync-btn">↻ Refresh</button>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><span class="stat-value" id="stat-total">—</span><span class="stat-label">Total Units</span></div>
    <div class="stat stat-deployed"><span class="stat-value" id="stat-deployed">—</span><span class="stat-label">Deployed</span></div>
    <div class="stat stat-scheduled"><span class="stat-value" id="stat-scheduled">—</span><span class="stat-label">Scheduled</span></div>
    <div class="stat stat-home"><span class="stat-value" id="stat-home">—</span><span class="stat-label">Home</span></div>
  </div>

  <div class="controls">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search by unit #, make, model, site..." oninput="renderTable()">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Deployed', this)">Deployed</button>
      <button class="filter-btn" onclick="setFilter('Scheduled', this)">Scheduled</button>
      <button class="filter-btn" onclick="setFilter('Home', this)">Home</button>
    </div>
    <button class="add-btn" onclick="openAddModal()">+ Add Unit</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Unit #</th><th>Make</th><th>Model</th><th>Year</th><th>Type</th>
          <th>Trailer Type</th><th>Deployment Site</th><th>Delivery Location</th><th>Status</th><th></th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="10"><div class="loading"><div class="spinner"></div><p>Loading...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Add New Unit</h2>
    <label>Unit #</label><input type="text" id="new-unit" placeholder="e.g. T-142">
    <label>Make</label><input type="text" id="new-make" placeholder="e.g. John Deere">
    <label>Model</label><input type="text" id="new-model" placeholder="e.g. 5075E">
    <label>Year</label><input type="text" id="new-year" placeholder="e.g. 2022">
    <label>Type</label><input type="text" id="new-type" placeholder="e.g. Tractor">
    <label>Trailer Type</label><input type="text" id="new-trailer" placeholder="e.g. Flatbed">
    <label>Deployment Site</label><input type="text" id="new-site" placeholder="e.g. Naperville Branch">
    <label>Delivery Location</label><input type="text" id="new-delivery" placeholder="e.g. Main Yard">
    <label>Status</label>
    <select id="new-status"><option>Deployed</option><option>Scheduled</option><option>Home</option></select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="addUnit()">Add Unit</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9pbULqlrSk9BGj6ftFZ8IZZRmrQLP13bWJZVFsY6WgmqGvMsoAglyhjNOFmh4-bTL/exec';
const CREDS = { user: 'GGGLogistics', pass: 'GGG1597!' };
const STATUSES = ['Deployed', 'Scheduled', 'Home'];

let allData = [];
let currentFilter = 'All';

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if (u === CREDS.user && p === CREDS.pass) {
    sessionStorage.setItem('ggg-auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function doLogout() { sessionStorage.removeItem('ggg-auth'); location.reload(); }
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

if (sessionStorage.getItem('ggg-auth')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

async function loadData() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '↻ Syncing...';
  try {
    const res = await fetch(SCRIPT_URL + '?action=read');
    const json = await res.json();
    if (json.success) {
      allData = json.data;
      updateStats();
      renderTable();
      document.getElementById('last-sync').textContent = 'Synced: ' + new Date().toLocaleTimeString();
      showToast('Data loaded', 'success');
    } else {
      showToast('Error loading data', 'error');
    }
  } catch(err) {
    showToast('Connection error', 'error');
    document.getElementById('table-body').innerHTML = '<tr><td colspan="10"><div class="empty-state"><p>Could not connect. Check Apps Script deployment.</p></div></td></tr>';
  }
  btn.textContent = '↻ Refresh';
}

async function updateCell(rowIndex, col, value) {
  try {
    const url = `${SCRIPT_URL}?action=write&row=${rowIndex + 1}&col=${encodeURIComponent(col)}&value=${encodeURIComponent(value)}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.success) showToast('Saved ✓', 'success');
    else showToast('Save failed', 'error');
  } catch(e) { showToast('Connection error', 'error'); }
}

async function addUnit() {
  const unit = document.getElementById('new-unit').value.trim();
  if (!unit) { showToast('Unit # is required', 'error'); return; }
  const row = {
    'Unit #': unit,
    'Make': document.getElementById('new-make').value,
    'Model': document.getElementById('new-model').value,
    'Year': document.getElementById('new-year').value,
    'Type': document.getElementById('new-type').value,
    'Trailer Type': document.getElementById('new-trailer').value,
    'Deployment Site': document.getElementById('new-site').value,
    'Delivery Location': document.getElementById('new-delivery').value,
    'Status': document.getElementById('new-status').value,
  };
  const newRowIndex = allData.length + 1;
  allData.push(row);
  closeModal();
  updateStats();
  renderTable();
  for (const [col, val] of Object.entries(row)) {
    const url = `${SCRIPT_URL}?action=write&row=${newRowIndex}&col=${encodeURIComponent(col)}&value=${encodeURIComponent(val)}`;
    await fetch(url);
  }
  showToast('Unit added', 'success');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function updateStats() {
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-deployed').textContent = allData.filter(r => r['Status'] === 'Deployed').length;
  document.getElementById('stat-scheduled').textContent = allData.filter(r => r['Status'] === 'Scheduled').length;
  document.getElementById('stat-home').textContent = allData.filter(r => r['Status'] === 'Home').length;
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = allData.filter(row => {
    const matchFilter = currentFilter === 'All' || row['Status'] === currentFilter;
    const matchSearch = !search || Object.values(row).some(v => String(v).toLowerCase().includes(search));
    return matchFilter && matchSearch;
  });
  const tbody = document.getElementById('table-body');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10"><div class="empty-state"><p>No equipment found.</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(row => {
    const realIndex = allData.indexOf(row);
    const status = row['Status'] || 'Deployed';
    return `<tr>
      <td class="unit-num">${esc(row['Unit #'])}</td>
      ${['Make','Model','Year','Type','Trailer Type','Deployment Site','Delivery Location'].map(col => `
        <td><input class="editable-cell" value="${esc(row[col] || '')}"
          onblur="handleEdit(${realIndex}, '${col}', this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"></td>
      `).join('')}
      <td><button class="status-badge status-${status}" onclick="cycleStatus(${realIndex}, this)">
        <span class="status-dot"></span>${status}
      </button></td>
      <td><button class="delete-btn" onclick="deleteRow(${realIndex})" title="Remove row">✕</button></td>
    </tr>`;
  }).join('');
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function handleEdit(index, col, value) {
  if (String(allData[index][col]) === value) return;
  allData[index][col] = value;
  updateCell(index, col, value);
}

function cycleStatus(index, btn) {
  const current = allData[index]['Status'] || 'Deployed';
  const next = STATUSES[(STATUSES.indexOf(current) + 1) % STATUSES.length];
  allData[index]['Status'] = next;
  btn.className = `status-badge status-${next}`;
  btn.innerHTML = `<span class="status-dot"></span>${next}`;
  updateCell(index, 'Status', next);
  updateStats();
}

function deleteRow(index) {
  if (!confirm(`Remove "${allData[index]['Unit #']}"? Delete from Google Sheet to make permanent.`)) return;
  allData.splice(index, 1);
  updateStats();
  renderTable();
  showToast('Removed from view', 'error');
}

function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }
document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) closeModal();
});

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2800);
}
</script>
</body>
</html>
